name: Build TrollStore IPA

on: 
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' 

      - name: Install Dependencies
        run: |
          cd simple_live_app
          flutter pub get

      # 👇 终极外科手术：强行修改苹果底层的 Podfile，把编译底线拉升到 16.4，彻底消灭新语法报错！
      - name: Fix iOS Deployment Target
        run: |
          cd simple_live_app/ios
          # 搜索并替换 Podfile 中的系统版本底线
          sed -i '' "s/^# platform :ios, '.*'/platform :ios, '16.4'/g" Podfile
          sed -i '' "s/^platform :ios, '.*'/platform :ios, '16.4'/g" Podfile
          # 强行清理缓存并重新拉取苹果底层依赖
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Build Unsigned iOS App
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign

      - name: Package into TrollStore IPA
        run: |
          cd simple_live_app/build/ios/iphoneos
          mkdir Payload
          mv Runner.app Payload/
          zip -qq -r simple_live_trollstore.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4 
        with:
          name: SimpleLive-TrollStore-IPA
          path: simple_live_app/build/ios/iphoneos/simple_live_trollstore.ipa
