name: Build TrollStore IPA

on: 
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest # 不折腾机器了，用回最稳定的默认配置

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' 

      # 👇 终极物理降维打击：在拉取依赖前，用脚本强行篡改 pubspec.yaml，锁死插件版本！
      - name: Force Downgrade connectivity_plus
        run: |
          cd simple_live_app
          echo "" >> pubspec.yaml
          echo "dependency_overrides:" >> pubspec.yaml
          echo "  connectivity_plus: '6.0.0'" >> pubspec.yaml

      - name: Install Dependencies
        run: |
          cd simple_live_app
          flutter pub get

      - name: Build Unsigned iOS App
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign

      - name: Package into TrollStore IPA
        run: |
          cd simple_live_app/build/ios/iphoneos
          mkdir Payload
          mv Runner.app Payload/
          zip -qq -r simple_live_trollstore.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4 
        with:
          name: SimpleLive-TrollStore-IPA
          path: simple_live_app/build/ios/iphoneos/simple_live_trollstore.ipa
