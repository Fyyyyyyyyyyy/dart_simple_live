name: Build TrollStore IPA

on: 
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-14 # 👈 终极必杀：强制指定 GitHub 最新一代的 macOS 14 (M1芯片) 服务器，自带满血最新版 Xcode！

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # 保持不锁版本，用最新 Flutter

      - name: Install Dependencies
        run: |
          cd simple_live_app
          flutter pub get

      - name: Build Unsigned iOS App
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign

      - name: Package into TrollStore IPA
        run: |
          cd simple_live_app/build/ios/iphoneos
          mkdir Payload
          mv Runner.app Payload/
          zip -qq -r simple_live_trollstore.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4 
        with:
          name: SimpleLive-TrollStore-IPA
          path: simple_live_app/build/ios/iphoneos/simple_live_trollstore.ipa
